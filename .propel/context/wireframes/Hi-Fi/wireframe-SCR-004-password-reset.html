<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCR-004 Password Reset - UPACIP</title>
<link rel="stylesheet" href="shared-tokens.css">
<style>
  .reset-shell { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--neutral-100); padding: var(--sp-6); }
  .reset-form { background: var(--neutral-0); border-radius: var(--radius-md); box-shadow: var(--shadow-1); padding: var(--sp-8); width: 100%; max-width: 440px; text-align: center; }
  .reset-icon { font-size: 3rem; margin-bottom: var(--sp-4); color: var(--primary-500); }
</style>
</head>
<body>
<!-- Navigation Map
| Element | Action | Target Screen |
|---------|--------|---------------|
| #reset-btn | click | SCR-004 Success State |
| #back-login | click | SCR-001 (Login) |
-->
<div class="reset-shell">
  <form class="reset-form" aria-label="Password reset form">
    <div class="reset-icon">🔒</div>
    <h1 class="h2" style="margin-bottom:var(--sp-2);">Reset your password</h1>
    <p class="body2 mb-6" style="color:var(--neutral-600);">Enter your email address and we'll send you a link to reset your password.</p>

    <div class="form-group" style="text-align:left;">
      <label class="form-label" for="reset-email">Email Address</label>
      <input id="reset-email" type="email" class="form-input" placeholder="e.g., john@email.com" required aria-required="true">
    </div>

    <button id="reset-btn" type="submit" class="btn btn-primary w-full">Send Reset Link</button>

    <p class="body2 mt-4">
      <a id="back-login" href="wireframe-SCR-001-login.html" style="color:var(--primary-500);text-decoration:none;">← Back to Sign In</a>
    </p>
  </form>
</div>
</body>
</html>
